<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180" width="180" height="180">
  <!-- Bold O lettermark - clean tech company feel -->
  <rect width="180" height="180" rx="40" fill="#0f172a"/>
  <text x="90" y="135" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-weight="900" font-size="130" fill="url(#grad)">O</text>
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#818cf8"/>
      <stop offset="100%" style="stop-color:#38bdf8"/>
    </linearGradient>
  </defs>
</svg>
